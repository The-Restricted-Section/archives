<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patrons of the Restricted Section</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');

        body {
            background: #0a0d08;
            color: #d4c3a3;
            font-family: 'IM Fell English', serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* The Fog Animation */
        .fog-wrapper {
            position: fixed;
            top: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }

        .fog {
            position: absolute;
            top: 0; left: 0; width: 200%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            animation: drift 60s linear infinite;
        }

        @keyframes drift {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        .vault-frame {
            position: relative;
            z-index: 10;
            text-align: center;
            border: 1px solid #2d3628;
            padding: 80px;
            background: rgba(10, 13, 8, 0.95);
            box-shadow: 0 0 100px rgba(0,0,0,1), inset 0 0 20px rgba(75, 31, 31, 0.2);
        }

        .trident {
            font-size: 80px;
            color: #4b1f1f;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(75, 31, 31, 0.8));
            animation: flicker 4s infinite;
        }

        h1 {
            font-weight: normal;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-size: 2.2rem;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(212, 195, 163, 0.2);
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            52% { opacity: 0.9; }
            54% { opacity: 0.7; }
        }

        .petition-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 45px;
            border: 1px solid #4b1f1f;
            color: #d4c3a3;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: rgba(75, 31, 31, 0.05);
            transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .petition-btn:hover {
            background: #4b1f1f;
            color: #0a0d08;
            box-shadow: 0 0 30px #4b1f1f;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>

    <div class="fog-wrapper"><div class="fog"></div></div>

    <div class="vault-frame">
        <div class="trident">ψ</div>
        <h1>Restricted Section</h1>
        <p><i>Membership is currently by Petition only.</i></p>
        <a href="mailto:archivist@hekatescript.com?subject=Petition%20for%20Entry" class="petition-btn">Petition</a>
    </div>

</body>
</html>
